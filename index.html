document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

A95A8;\">{{ v.note }}<\u002Fdiv>\n                <\u002Fdiv>\n                <sc-if value=\"{{ v.active }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: #19E08C;\">SELECTED<\u002Fspan>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"border-radius: 18px; padding: 28px; background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)); border: 1px solid rgba(255,255,255,0.09); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);\">\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 18px; color: #F3F6FA; margin-bottom: 4px;\">Agent behaviour<\u002Fdiv>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.06em; color: #66718a; margin-bottom: 24px;\">Tune per agent, per use case<\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 22px;\">\n            <sc-for list=\"{{ sliders }}\" as=\"sl\" hint-placeholder-count=\"3\">\n              <div>\n                <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;\">\n                  <span style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; color: #F3F6FA;\">{{ sl.label }}<\u002Fspan>\n                  <span style=\"font-family: 'Space Mono', monospace; font-size: 12px; color: #19E08C; background: rgba(25,224,140,0.1); border-radius: 6px; padding: 2px 8px;\">{{ sl.val }}<\u002Fspan>\n                <\u002Fdiv>\n                <input type=\"range\" min=\"0\" max=\"100\" value=\"{{ sl.val }}\" oninput=\"{{ sl.onInput }}\" style=\"{{ sl.fillStyle }}\">\n                <div style=\"display: flex; justify-content: space-between; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: #66718a; margin-top: 9px;\"><span>{{ sl.left }}<\u002Fspan><span>{{ sl.right }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-size: 12.5px; line-height: 1.5; color: #8A95A8; margin-top: 22px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.06);\">The agent speaks as <span style=\"color: #F3F6FA; font-weight: 600;\">your<\u002Fspan> brand — e.g. \"Relationship Manager\" — never as an Evitar bot.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr)); gap: 18px; margin-top: 18px;\">\n        <div style=\"border-radius: 18px; padding: 28px; background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)); border: 1px solid rgba(255,255,255,0.09); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);\">\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 18px; color: #F3F6FA; margin-bottom: 4px;\">One customer. One memory.<\u002Fdiv>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.06em; color: #66718a; margin-bottom: 22px;\">Context follows the customer across channels — they never repeat themselves<\u002Fdiv>\n          <div style=\"display: flex; gap: 12px; align-items: flex-start; margin-bottom: 11px;\"><span style=\"flex: none; width: 84px; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: #6FF0B4; border: 1px solid rgba(25,224,140,0.3); background: rgba(25,224,140,0.06); border-radius: 6px; padding: 5px 0; text-align: center;\">Voice<\u002Fspan><span style=\"font-size: 13px; line-height: 1.5; color: #C8D2DE;\">Outbound call — no answer.<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; gap: 12px; align-items: flex-start; margin-bottom: 11px;\"><span style=\"flex: none; width: 84px; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: #6FF0B4; border: 1px solid rgba(25,224,140,0.3); background: rgba(25,224,140,0.06); border-radius: 6px; padding: 5px 0; text-align: center;\">WhatsApp<\u002Fspan><span style=\"font-size: 13px; line-height: 1.5; color: #C8D2DE;\">Follows up: “We tried reaching you about your application — shall we continue here?”<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; gap: 12px; align-items: flex-start; margin-bottom: 11px;\"><span style=\"flex: none; width: 84px; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: #9FB4C7; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); border-radius: 6px; padding: 5px 0; text-align: center;\">Customer<\u002Fspan><span style=\"font-size: 13px; line-height: 1.5; color: #C8D2DE;\">Shares monthly income.<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; gap: 12px; align-items: flex-start; margin-bottom: 11px;\"><span style=\"flex: none; width: 84px; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: #6FF0B4; border: 1px solid rgba(25,224,140,0.3); background: rgba(25,224,140,0.06); border-radius: 6px; padding: 5px 0; text-align: center;\">Voice<\u002Fspan><span style=\"font-size: 13px; line-height: 1.5; color: #C8D2DE;\">Calls back: “I can see your income is on file — let’s finish the application.”<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; gap: 12px; align-items: flex-start;\"><span style=\"flex: none; width: 84px; font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: #9FB4C7; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); border-radius: 6px; padding: 5px 0; text-align: center;\">Human<\u002Fspan><span style=\"font-size: 13px; line-height: 1.5; color: #C8D2DE;\">Warm escalation with the full history — nothing repeated.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-radius: 18px; padding: 28px; background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)); border: 1px solid rgba(255,255,255,0.09); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);\">\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 18px; color: #F3F6FA; margin-bottom: 4px;\">Journey handoff rules<\u002Fdiv>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.06em; color: #66718a; margin-bottom: 16px;\">How the agents hand off — to each other and to your people<\u002Fdiv>\n          <sc-for list=\"{{ rulesList }}\" as=\"r\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ r.toggle }}\" style=\"cursor: pointer; display: flex; gap: 11px; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.05);\">\n              <sc-if value=\"{{ r.on }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"flex: none; width: 20px; height: 20px; border-radius: 6px; background: linear-gradient(180deg, #2CF09C, #15C97B); color: #03130C; font-size: 12px; display: flex; align-items: center; justify-content: center;\">✓<\u002Fspan><\u002Fsc-if>\n              <sc-if value=\"{{ r.off }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex: none; width: 20px; height: 20px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);\"><\u002Fspan><\u002Fsc-if>\n              <span style=\"font-size: 13.5px; line-height: 1.4; color: #C8D2DE;\">{{ r.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"font-size: 12px; line-height: 1.5; color: #8A95A8; margin-top: 16px;\">Orchestration runs on the shared customer context — not isolated bots.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 320px), 1fr)); gap: 18px; margin-top: 18px;\">\n        <div style=\"border-radius: 18px; padding: 28px; background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)); border: 1px solid rgba(255,255,255,0.09); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);\">\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 18px; color: #F3F6FA; margin-bottom: 4px;\">WhatsApp agent — channel setup<\u002Fdiv>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.06em; color: #66718a; margin-bottom: 20px;\">Voice and WhatsApp behave differently — tune WhatsApp on its own<\u002Fdiv>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: #8A95A8; margin-bottom: 9px;\">Tone<\u002Fdiv>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px;\"><sc-for list=\"{{ waTones }}\" as=\"t\" hint-placeholder-count=\"4\"><div onclick=\"{{ t.onClick }}\" style=\"cursor: pointer;\"><sc-if value=\"{{ t.active }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display: inline-block; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: #03130C; background: linear-gradient(180deg, #2CF09C, #15C97B); padding: 7px 12px; border-radius: 8px;\">{{ t.label }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ t.inactive }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"display: inline-block; font-family: 'Space Mono', monospace; font-size: 11px; color: #8A95A8; border: 1px solid rgba(255,255,255,0.12); padding: 7px 12px; border-radius: 8px;\">{{ t.label }}<\u002Fspan><\u002Fsc-if><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: #8A95A8; margin-bottom: 9px;\">Languages<\u002Fdiv>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px;\"><sc-for list=\"{{ waLangs }}\" as=\"l\" hint-placeholder-count=\"6\"><div onclick=\"{{ l.toggle }}\" style=\"cursor: pointer;\"><sc-if value=\"{{ l.on }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display: inline-block; font-family: 'Space Mono', monospace; font-size: 11px; color: #19E08C; background: rgba(25,224,140,0.1); border: 1px solid rgba(25,224,140,0.45); padding: 7px 12px; border-radius: 8px;\">✓ {{ l.label }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ l.off }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"display: inline-block; font-family: 'Space Mono', monospace; font-size: 11px; color: #8A95A8; border: 1px solid rgba(255,255,255,0.12); padding: 7px 12px; border-radius: 8px;\">{{ l.label }}<\u002Fspan><\u002Fsc-if><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: #8A95A8; margin-bottom: 9px;\">Message style<\u002Fdiv>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px;\"><sc-for list=\"{{ waStyles }}\" as=\"t\" hint-placeholder-count=\"4\"><div onclick=\"{{ t.onClick }}\" style=\"cursor: pointer;\"><sc-if value=\"{{ t.active }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display: inline-block; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; color: #03130C; background: linear-gradient(180deg, #2CF09C, #15C97B); padding: 7px 12px; border-radius: 8px;\">{{ t.label }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ t.inactive }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"display: inline-block; font-family: 'Space Mono', monospace; font-size: 11px; color: #8A95A8; border: 1px solid rgba(255,255,255,0.12); padding: 7px 12px; border-radius: 8px;\">{{ t.label }}<\u002Fspan><\u002Fsc-if><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; color: #8A95A8; margin-bottom: 9px;\">Rich content<\u002Fdiv>\n          <div style=\"display: flex; flex-wrap: wrap; gap: 7px;\"><sc-for list=\"{{ waRich }}\" as=\"l\" hint-placeholder-count=\"5\"><div onclick=\"{{ l.toggle }}\" style=\"cursor: pointer;\"><sc-if value=\"{{ l.on }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display: inline-block; font-family: 'Space Mono', monospace; font-size: 11px; color: #19E08C; background: rgba(25,224,140,0.1); border: 1px solid rgba(25,224,140,0.45); padding: 7px 12px; border-radius: 8px;\">✓ {{ l.label }}<\u002Fspan><\u002Fsc-if><sc-if value=\"{{ l.off }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"display: inline-block; font-family: 'Space Mono', monospace; font-size: 11px; color: #8A95A8; border: 1px solid rgba(255,255,255,0.12); padding: 7px 12px; border-radius: 8px;\">{{ l.label }}<\u002Fspan><\u002Fsc-if><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-radius: 18px; padding: 28px; background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)); border: 1px solid rgba(255,255,255,0.09); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);\">\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 18px; color: #F3F6FA; margin-bottom: 4px;\">Governance controls<\u002Fdiv>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.06em; color: #66718a; margin-bottom: 16px;\">What your risk &amp; compliance team locks before go-live<\u002Fdiv>\n          <sc-for list=\"{{ govItems }}\" as=\"g\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ g.toggle }}\" style=\"cursor: pointer; display: flex; gap: 11px; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.05);\">\n              <sc-if value=\"{{ g.on }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"flex: none; width: 20px; height: 20px; border-radius: 6px; background: linear-gradient(180deg, #2CF09C, #15C97B); color: #03130C; font-size: 12px; display: flex; align-items: center; justify-content: center;\">✓<\u002Fspan><\u002Fsc-if>\n              <sc-if value=\"{{ g.off }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex: none; width: 20px; height: 20px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);\"><\u002Fspan><\u002Fsc-if>\n              <span style=\"font-size: 13.5px; line-height: 1.4; color: #C8D2DE;\">{{ g.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"font-size: 12px; line-height: 1.5; color: #8A95A8; margin-top: 16px;\">Locked controls apply to every agent and channel — auditable by design.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ THE LOOP ============ -->\n  <section style=\"position: relative; z-index: 1;\">\n    <div style=\"max-width: 1200px; margin: 0 auto; padding: 90px 26px;\">\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #19E08C; margin-bottom: 16px;\">The loop is the product<\u002Fdiv>\n      <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(28px, 3.4vw, 44px); line-height: 1.08; letter-spacing: -0.025em; color: #F3F6FA; margin: 0 0 40px; max-width: 700px; text-wrap: balance;\">Drive every conversation. Improve every agent. On repeat.<\u002Fh2>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr)); gap: 18px;\">\n        <div style=\"border-radius: 18px; padding: 30px; background: linear-gradient(155deg, rgba(25,224,140,0.1), rgba(255,255,255,0.012)); border: 1px solid rgba(25,224,140,0.25); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);\">\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.16em; color: #19E08C; margin-bottom: 16px;\">DRIVE<\u002Fdiv>\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 23px; line-height: 1.2; color: #F3F6FA; margin-bottom: 14px;\">Move every conversation toward an outcome.<\u002Fdiv>\n          <div style=\"font-size: 15px; line-height: 1.6; color: #A6B2C0;\">Understand intent, recommend the next step, capture the lead, book the callback, hand to a human at the right moment — in the customer's language, across any surface. No menu trees, no lost threads.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-radius: 18px; padding: 30px; background: linear-gradient(155deg, rgba(80,170,232,0.1), rgba(255,255,255,0.012)); border: 1px solid rgba(80,170,232,0.25); box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);\">\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.16em; color: #5FBDEA; margin-bottom: 16px;\">IMPROVE<\u002Fdiv>\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 23px; line-height: 1.2; color: #F3F6FA; margin-bottom: 14px;\">Make every agent better over time.<\u002Fdiv>\n          <div style=\"font-size: 15px; line-height: 1.6; color: #A6B2C0;\">Score 100% of calls — human and AI — generate personalised coaching from real gaps, then measure the before-and-after. When the numbers don't move, a human trainer steps in.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align: center; font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 20px; color: #97A2B4; margin-top: 30px;\">Most tools do one. <span style=\"color: #19E08C;\">The loop between them is the product.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ QUALITY ============ -->\n  <section id=\"quality\" style=\"position: relative; z-index: 1; border-top: 1px solid rgba(255,255,255,0.05);\">\n    <div style=\"max-width: 1200px; margin: 0 auto; padding: 90px 26px;\">\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #5FBDEA; margin-bottom: 16px;\">Quality &amp; coaching<\u002Fdiv>\n      <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(28px, 3.4vw, 46px); line-height: 1.06; letter-spacing: -0.025em; color: #F3F6FA; margin: 0; max-width: 820px; text-wrap: balance;\">Every call scored. Every agent coached. The proof measured.<\u002Fh2>\n      <p style=\"font-size: 17px; line-height: 1.6; color: #97A2B4; margin: 18px 0 44px; max-width: 640px;\">A closed quality loop on 100% of conversations — including the AI's own. The part most contact centres already budget for, done end to end.<\u002Fp>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 150px), 1fr)); gap: 12px;\">\n        <sc-for list=\"{{ qualitySteps }}\" as=\"q\" hint-placeholder-count=\"6\">\n          <div style=\"border-radius: 14px; padding: 18px; background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012)); border: 1px solid rgba(255,255,255,0.08); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);\">\n            <div style=\"font-family: 'Space Mono', monospace; font-size: 10.5px; letter-spacing: 0.08em; color: #5FBDEA; margin-bottom: 12px;\">{{ q.step }}<\u002Fdiv>\n            <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15px; line-height: 1.2; color: #F3F6FA; margin-bottom: 9px;\">{{ q.title }}<\u002Fdiv>\n            <div style=\"font-size: 12.5px; line-height: 1.5; color: #8A95A8;\">{{ q.line }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"margin-top: 18px; border-radius: 14px; border: 1px solid rgba(80,170,232,0.28); background: rgba(80,170,232,0.06); padding: 18px 22px; font-size: 15px; line-height: 1.55; color: #C8D2DE;\">This loop scores the <span style=\"color: #5FBDEA; font-weight: 600;\">AI agents too<\u002Fspan> — so an AI conversation is held to the same bar as your best human, and flagged the moment it drifts.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ COMMAND CENTER ============ -->\n  <section id=\"command\" style=\"position: relative; z-index: 1; border-top: 1px solid rgba(255,255,255,0.05);\">\n    <div style=\"position: absolute; top: 60px; right: -120px; width: 560px; height: 560px; border-radius: 50%; background: radial-gradient(circle, rgba(80,170,232,0.1), transparent 60%); filter: blur(50px); pointer-events: none;\"><\u002Fdiv>\n    <div style=\"position: relative; max-width: 1200px; margin: 0 auto; padding: 90px 26px;\">\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #5FBDEA; margin-bottom: 16px;\">AI Command Center<\u002Fdiv>\n      <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(30px, 3.8vw, 48px); line-height: 1.05; letter-spacing: -0.025em; color: #F3F6FA; margin: 0; max-width: 840px; text-wrap: balance;\">One view across sales, service, renewals and quality — that tells you what to do next.<\u002Fh2>\n      <p style=\"font-size: 17px; line-height: 1.6; color: #97A2B4; margin: 18px 0 40px; max-width: 640px;\">Role-based dashboards for the people who own the number — with an agent that reads the signal and recommends the next action. This is where the platform becomes agentic.<\u002Fp>\n\n      <div style=\"border-radius: 20px; padding: 8px; background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)); border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 50px 90px -50px rgba(0,0,0,0.95);\">\n        <div style=\"display: flex; align-items: center; gap: 10px; padding: 14px 18px; flex-wrap: wrap;\">\n          <span style=\"width: 11px; height -wrap: wrap; margin-top: 16px;\">\n          <span style=\"font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #5FBDEA;\">{{ roleLabel }} sees<\u002Fspan>\n          <sc-for list=\"{{ roleSees }}\" as=\"s\" hint-placeholder-count=\"3\"><span style=\"font-family: 'Space Mono', monospace; font-size: 11px; color: #C8D2DE; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.03); padding: 6px 11px; border-radius: 8px;\">{{ s }}<\u002Fspan><\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 10.5px; letter-spacing: 0.03em; color: #525d72; margin-top: 16px;\">Illustrative dashboard — figures shown for layout only.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ GOVERNANCE ============ -->\n  <section id=\"governance\" style=\"position: relative; z-index: 1; border-top: 1px solid rgba(255,255,255,0.05); background: linear-gradient(180deg, rgba(255,255,255,0.012), transparent);\">\n    <div style=\"max-width: 1200px; margin: 0 auto; padding: 90px 26px;\">\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #19E08C; margin-bottom: 16px;\">Governance &amp; compliance<\u002Fdiv>\n      <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(28px, 3.4vw, 46px); line-height: 1.06; letter-spacing: -0.025em; color: #F3F6FA; margin: 0; max-width: 760px; text-wrap: balance;\">Guardrails built in, not bolted on.<\u002Fh2>\n      <p style=\"font-size: 17px; line-height: 1.6; color: #97A2B4; margin: 18px 0 40px; max-width: 640px;\">The controls your buying committee asks for — so the link survives the forward to infosec, risk and procurement.<\u002Fp>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 230px), 1fr)); gap: 16px; margin-bottom: 24px;\">\n        <sc-for list=\"{{ controls }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <div style=\"border-radius: 14px; padding: 20px; background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012)); border: 1px solid rgba(255,255,255,0.08); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);\">\n            <div style=\"display: flex; align-items: center; gap: 9px; margin-bottom: 9px;\"><span style=\"color: #19E08C; font-size: 14px;\">✓<\u002Fspan><span style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 15px; color: #F3F6FA;\">{{ c.h }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size: 13.5px; line-height: 1.5; color: #8A95A8;\">{{ c.rest }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 200px), 1fr)); gap: 14px;\">\n        <sc-for list=\"{{ stats }}\" as=\"st\" hint-placeholder-count=\"4\">\n          <div style=\"border-radius: 16px; padding: 22px; background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012)); border: 1px solid rgba(255,255,255,0.08); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);\">\n            <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 30px; letter-spacing: -0.02em; background: linear-gradient(180deg, #FFFFFF, #8fe9c2); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; margin-bottom: 9px;\">{{ st.v }}<\u002Fdiv>\n            <div style=\"font-size: 13px; line-height: 1.45; color: #C8D2DE; margin-bottom: 12px;\">{{ st.l }}<\u002Fdiv>\n            <div style=\"font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase; color: #66718a;\">{{ st.s }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SEGMENT CONFIG ============ -->\n  <section style=\"position: relative; z-index: 1; border-top: 1px solid rgba(255,255,255,0.05);\">\n    <div style=\"max-width: 1200px; margin: 0 auto; padding: 90px 26px;\">\n      <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #19E08C; margin-bottom: 16px;\">Configured for your segment<\u002Fdiv>\n      <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(28px, 3.4vw, 44px); line-height: 1.08; letter-spacing: -0.025em; color: #F3F6FA; margin: 0 0 12px; max-width: 700px; text-wrap: balance;\">A proven platform, shaped to your book.<\u002Fh2>\n      <p style=\"font-size: 16px; color: #97A2B4; margin: 0 0 32px;\">Showing <span style=\"color: #19E08C;\">{{ S.label }}<\u002Fspan> — change it from the segment chips up top.<\u002Fp>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 200px), 1fr)); gap: 16px;\">\n        <sc-for list=\"{{ c8groups }}\" as=\"g\" hint-placeholder-count=\"4\">\n          <div style=\"border-radius: 16px; padding: 22px; background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012)); border: 1px solid rgba(255,255,255,0.08); box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);\">\n            <div style=\"font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: {{ g.color }}; margin-bottom: 16px;\">{{ g.label }}<\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 11px;\">\n              <sc-for list=\"{{ g.items }}\" as=\"it\" hint-placeholder-count=\"4\">\n                <div style=\"display: flex; gap: 9px; align-items: flex-start;\"><span style=\"color: {{ g.color }}; font-size: 12px; margin-top: 2px;\">▸<\u002Fspan><span style=\"font-size: 14px; line-height: 1.45; color: #C8D2DE;\">{{ it }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ BUILD YOUR PILOT / CLOSE ============ -->\n  <section id=\"pilot\" style=\"position: relative; z-index: 1; border-top: 1px solid rgba(255,255,255,0.05);\">\n    <div style=\"position: absolute; left: 50%; top: 10%; transform: translateX(-50%); width: 820px; height: 460px; border-radius: 50%; background: radial-gradient(circle, rgba(25,224,140,0.16), transparent 64%); filter: blur(40px); opacity: 0.7; pointer-events: none; animation: evPulse 8s ease-in-out infinite;\"><\u002Fdiv>\n    <div style=\"position: relative; max-width: 1200px; margin: 0 auto; padding: 96px 26px;\">\n      <div style=\"text-align: center; margin-bottom: 40px;\">\n        <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: #19E08C; margin-bottom: 18px;\">See it on your data<\u002Fdiv>\n        <h2 style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: clamp(30px, 4vw, 54px); line-height: 1.04; letter-spacing: -0.03em; margin: 0 auto; max-width: 760px; background: linear-gradient(180deg, #FFFFFF, #AAB4C4); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; text-wrap: balance;\">See it run on your own book, in weeks.<\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.6; color: #97A2B4; margin: 22px auto 0; max-width: 600px;\">We stand up a working demo on a sandbox, measured against your own baseline. You hear it on your data before you commit to anything.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"max-width: 720px; margin: 0 auto; border-radius: 20px; padding: 28px; background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)); border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), 0 40px 80px -50px rgba(0,0,0,0.9);\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;\">\n          <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 17px; color: #F3F6FA;\">Your pilot<\u002Fdiv>\n          <div style=\"font-family: 'Space Mono', monospace; font-size: 12px; color: #19E08C;\">{{ selectedCount }} agents<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ noSelection }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align: center; font-size: 14px; color: #8A95A8; padding: 22px; border: 1px dashed rgba(255,255,255,0.14); border-radius: 12px;\">No agents yet — add some from the constellation above.<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ hasSelection }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display: flex; flex-wrap: wrap; gap: 9px;\">\n            <sc-for list=\"{{ selectedAgents }}\" as=\"a\" hint-placeholder-count=\"2\">\n              <div style=\"display: inline-flex; align-items: center; gap: 9px; border-radius: 10px; padding: 9px 12px; background: rgba(25,224,140,0.07); border: 1px solid rgba(25,224,140,0.3);\">\n                <span style=\"font-family: 'Space Mono', monospace; font-weight: 700; font-size: 11px; color: #6FF0B4;\">{{ a.code }}<\u002Fspan>\n                <span style=\"font-size: 13px; color: #EAF0F6;\">{{ a.name }}<\u002Fspan>\n                <span onclick=\"{{ a.toggle }}\" style=\"cursor: pointer; color: #8A95A8; font-size: 14px;\">✕<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display: flex; gap: 12px; align-items: center; margin-top: 24px; flex-wrap: wrap;\">\n          <a href=\"mailto:clients@evitar.ai?subject=Book%20a%20demo\" style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 16px; color: #03130C; background: linear-gradient(180deg, #2CF09C, #15C97B); padding: 15px 30px; border-radius: 12px; box-shadow: 0 14px 34px -12px rgba(25,224,140,0.7), inset 0 1px 0 rgba(255,255,255,0.4);\" style-hover=\"transform: translateY(-2px);\">Book a demo →<\u002Fa>\n          <span style=\"font-size: 13px; color: #8A95A8;\">No commitment · demo-led scoping call · <a href=\"mailto:clients@evitar.ai\" style=\"color: #19E08C;\">clients@evitar.ai<\u002Fa><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"position: relative; z-index: 1; border-top: 1px solid rgba(255,255,255,0.06);\">\n    <div style=\"max-width: 1200px; margin: 0 auto; padding: 40px 26px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;\">\n      <div>\n        <div style=\"font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 19px; letter-spacing: -0.02em; color: #F3F6FA;\">evitar<span style=\"color: #19E08C;\">/ai<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size: 13px; color: #66718a; margin-top: 4px;\">The agentic layer for BFSI conversations<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; gap: 26px; font-size: 13px;\">\n        <a href=\"#agents\" style=\"color: #97A2B4;\">Agents<\u002Fa>\n        <a href=\"#quality\" style=\"color: #97A2B4;\">Quality<\u002Fa>\n        <a href=\"#governance\" style=\"color: #97A2B4;\">Governance<\u002Fa>\n        <a href=\"mailto:clients@evitar.ai\" style=\"color: #97A2B4;\">Contact<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ============ STICKY PILOT BAR (removed — single CTA at close) ============ -->\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:3400}}\">\nclass Component extends DCLogic {\n  state = {\n    seg: 'insurance', prompt: 0, voice: 'anika', goal: 'conversion', recIndex: 0,\n    empathy: 65, sales: 45, interrupt: 40,\n    selected: { voice: true, quality: true },\n    rules: { missed: true, noreply: true, resume: true, escalate: true, renewal: false },\n    waTone: 'Professional', waStyle: 'Guided assistance', cmdRole: 'ops',\n    waLangs: { English: true, Hindi: true, Hinglish: true, Marathi: false, Tamil: false, Bengali: false },\n    waRich: { 'Buttons': true, 'Carousels': false, 'PDFs': true, 'Payment links': true, 'Voice notes': true },\n    govT: { handoff: true, prompts: true, sources: true, escalation: true, audit: true }\n  };\n\n  componentDidMount() { this._rec = setInterval(() => this.setState(s => ({ recIndex: s.recIndex + 1 })), 3600); }\n  componentWillUnmount() { if (this._rec) clearInterval(this._rec); }\n  addAgents(keys) { this.setState(s => { const sel = { ...s.selected }; keys.forEach(k => sel[k] = true); return { selected: sel }; }); }\n  toggleRule(k) { this.setState(s => ({ rules: Object.assign({}, s.rules, { [k]: !s.rules[k] }) })); }\n  toggleSet(group, k) { this.setState(s => ({ [group]: Object.assign({}, s[group], { [k]: !s[group][k] }) })); }\n  setField(key, val) { this.setState({ [key]: val }); }\n\n  agentList() {\n    return [\n      { code: 'VO', key: 'voice', name: 'AI Voice Agent', tag: 'Sales · Renewals', group: 'ENGAGE', desc: 'Outbound and inbound calls that qualify, renew, collect and confirm — consultative, in 10+ Indian languages, with behaviour sliders and opening-line override.' },\n      { code: 'WA', key: 'whatsapp', name: 'WhatsApp Agent', tag: 'Voice notes + text', group: 'ENGAGE', desc: 'Nudges, document collection, payment links and TTS voice notes — two-way, on the channel India actually replies to.' },\n      { code: 'WB', key: 'chat', name: 'Web Chat Agent', tag: 'Website RIC', group: 'ENGAGE', desc: 'Rich interactive chat that answers, qualifies and warm-transfers to a human — on your own site or portal.' },\n      { code: 'FF', key: 'form', name: 'Form-Filling Agent', tag: 'Voice-assisted capture', group: 'ENGAGE', desc: 'Completes applications and KYC by voice — fewer drop-offs, cleaner first-time-right data.' },\n      { code: 'FB', key: 'field', name: 'Field Buddy', tag: 'Feet-on-street', group: 'ENGAGE', desc: 'A field-sales co-pilot: visit prep, in-language pitch help, objection handling and notes captured by voice.' },\n      { code: 'QT', key: 'quality', name: 'Quality & Training', tag: '100% scored', group: 'IMPROVE', desc: 'VTT transcription and Call Quality Index on every call — human and AI — personalised coaching from real gaps, before/after proof, human-in-the-loop approvals.' },\n      { code: 'CC', key: 'command', name: 'Command Center', tag: 'Ops & insight', group: 'ORCHESTRATE', desc: 'Role-based analytics across acquisition and renewals — Voice of Customer, competition matrix, channel comparison, AI insights, and a co-pilot for every role that suggests the next-best corrective action.' }\n    ];\n  }\n\n  segData() {\n    return {\n      insurance: {\n        label: 'Life & General Insurance',\n        demoHead: \"Today's bot redirects. An Evitar agent resolves.\",\n        demoContext: 'Term & health · acquisition, renewals, servicing',\n        prompts: ['Price', 'In Hindi', 'Missed premium', 'Callback'],\n        convos: [\n          { q: 'How much does ₹1 crore cover cost at 35?', today: \"I didn't understand that. Please choose from the menu: 1) Products 2) Branches 3) Claims.\", ev: \"For a 35-yr-old non-smoker, ₹1 crore term cover starts around ₹15–30 a day. Exact premium depends on age, smoking status and term — shall I pull your exact quote? I'll just need your date of birth.\" },\n          { q: 'mujhe apne parivar ke liye term plan chahiye', today: 'Sorry, I can only respond in English. Please type a menu option.', ev: 'Bilkul! Parivar ko suraksha dena samajhdaari ka faisla hai. Cover aam taur par income ka 10–15 guna hona chahiye. Do baatein bataaiye — umar aur saalana income — main sahi cover aur premium bata deta hoon.' },\n          { q: 'I missed my premium payment — what now?', today: 'For payment queries, please call our helpline or visit the nearest branch.', ev: \"No need to worry — you're likely within the grace period, so cover continues if you pay within the window. I can pull your policy and send the exact due amount and a payment link right here.\" },\n          { q: 'Can someone call me tomorrow at 7pm?', today: \"Please type 'menu' to see available options.\", ev: \"Done — callback booked for tomorrow, 7:00 PM, an advisor will call this number. So they're ready: new plan, existing policy, or a claim?\" }\n        ],\n        c8: {\n          outcomes: ['Higher lead conversion', 'Higher persistency', 'Lower servicing cost', 'Stronger multilingual reach'],\n          journeys: ['Quote-to-policy', 'Renewal save', 'Servicing & self-serve'],\n          rubric: ['Lead quality', 'Renewal coaching', 'Advisor effectiveness', 'Claims-servicing QA'],\n          regulatory: ['IRDAI alignment', 'Policy disclosures', 'Product suitability', 'Consent capture']\n        }\n      },\n      lending: {\n        label: 'HFCs & NBFCs',\n        demoHead: \"Today's bot redirects. An Evitar agent recovers.\",\n        demoContext: 'Secured & unsecured lending · collections, servicing',\n        prompts: ['Due date', 'Hardship', 'Paid already', 'Callback'],\n        convos: [\n          { q: 'Meri EMI kab tak bharni hai?', today: 'For payment queries, please call our helpline or visit the nearest branch.', ev: 'Aapki EMI ki due date 7 tarikh hai. Main abhi exact amount aur ek payment link yahin bhej deta hoon — pay karte hi confirmation mil jayega. Kya main link bhej doon?' },\n          { q: 'I lost my job — can I get more time to pay?', today: \"I didn't understand that. Please choose from the menu: 1) Balance 2) Branches 3) Foreclosure.\", ev: 'I understand, and thank you for telling us early. You may be eligible for a short revised arrangement. Can I note a date you expect to pay by? I will record the commitment and have the right team confirm the options with you.' },\n          { q: 'I already paid yesterday, why are you calling?', today: 'Our records may not be updated. Please call the helpline.', ev: \"Apologies for the call — let me check. I can see a payment in process; it typically reflects within 24 hours. I'll send you the receipt reference here and stop further reminders for this cycle.\" },\n          { q: 'Call me after 6pm today', today: \"Please type 'menu' to see available options.\", ev: \"Done — I've scheduled a callback for after 6:00 PM on this number. Is it about the current EMI, or a settlement option?\" }\n        ],\n        c8: {\n          outcomes: ['Lower cost-to-collect', 'Wider reach', 'Higher contactability', 'Better collections efficiency'],\n          journeys: ['Collections follow-up', 'EMI reminder', 'Servicing & self-serve'],\n          rubric: ['Collections compliance', 'PTP-capture quality', 'Recovery effectiveness', 'EMI-servicing QA'],\n          regulatory: ['RBI collections norms', 'Approved scripts', 'Escalation controls', 'Audit trails']\n        }\n      },\n      cards: {\n        label: 'Cards',\n        demoHead: \"Today's bot redirects. An Evitar agent resolves.\",\n        demoContext: 'Credit cards · acquisition, activation, retention',\n        prompts: ['Benefits', 'Rewards', 'Limit increase', 'Callback'],\n        convos: [\n          { q: 'What are the benefits on this card?', today: \"I didn't understand that. Please choose from the menu: 1) Apply 2) Offers 3) Customer care.\", ev: \"Happy to help. This card's headline benefits are accelerated rewards on dining and travel, lounge access and milestone vouchers. Want me to check which spends earn you the most based on how you usually use a card?\" },\n          { q: 'How do I redeem my reward points?', today: 'For rewards queries, please visit the website or call customer care.', ev: 'You can redeem against statement balance, vouchers or partner catalogues. I can see your available points and walk you through the fastest redemption right here — shall I show the options?' },\n          { q: 'I want to increase my credit limit', today: \"Please type 'menu' to see available options.\", ev: \"I can start that for you. Eligibility depends on your spends and history — I'll capture the request, run the eligibility check, and a specialist will confirm the revised limit. Shall I proceed?\" },\n          { q: 'Can someone call me tomorrow evening?', today: 'Sorry, I can only respond in English. Please type a menu option.', ev: \"Done — callback booked for tomorrow evening on this number. So they're ready: a new card, an existing card, or a rewards question?\" }\n        ],\n        c8: {\n          outcomes: ['Higher activation', 'Stronger retention', 'More rewards usage', 'Lower cost-to-serve'],\n          journeys: ['Card activation', 'Rewards redemption', 'Retention save'],\n          rubric: ['Activation effectiveness', 'Retention-call quality', 'Rewards-servicing QA', 'Limit-request handling'],\n          regulatory: ['Card disclosures', 'Fraud-escalation controls', 'Consent management', 'Dispute handling']\n        }\n      }\n    };\n  }\n\n  toggle(key) { this.setState(s => ({ selected: { ...s.selected, [key]: !s.selected[key] } })); }\n\n  renderVals() {\n    const seg = this.state.seg;\n    const SEG = this.segData();\n    const S = SEG[seg];\n    const sel = this.state.selected;\n\n    const enrich = (a) => ({ ...a, on: !!sel[a.key], off: !sel[a.key], toggle: () => this.toggle(a.key), gVoice: a.key==='voice', gWhatsapp: a.key==='whatsapp', gChat: a.key==='chat', gForm: a.key==='form', gField: a.key==='field', gQuality: a.key==='quality', gCommand: a.key==='command' });\n    const all = this.agentList().map(enrich);\n    const heroAgents = all;\n    const selectedAgents = all.filter(a => a.on);\n    const byGroup = (g) => all.filter(a => a.group === g);\n    const groups = [\n      { label: 'Engage · customer-facing', color: '#19E08C', cols: 'repeat(auto-fit, bel, left, right, val, fillStyle: 'background: linear-gradient(90deg, #19E08C 0%, #19E08C ' + val + '%, #1b2436 ' + val + '%);', onInput: (e) => this.setState({ [key]: parseInt(e.target.value, 10) }) };\n    };\n    const sliders = [mkSlider('empathy', 'Empathy', 'Direct', 'Warm'), mkSlider('sales', 'Sales intensity', 'Soft nurture', 'Hard close'), mkSlider('interrupt', 'Interrupt sensitivity', 'Patient', 'Responsive')];\n\n    const qualitySteps = [\n      { step: '01 · CAPTURE', title: '100% transcription', line: 'Every call, human and AI — not 2–5% manual sampling.' },\n      { step: '02 · SCORE', title: 'Call Quality Index', line: 'Configurable rubric: discovery, objections, compliance, close.' },\n      { step: '03 · LISTEN', title: 'Voice of Customer', line: 'Sentiment and friction from the conversation — not a survey.' },\n      { step: '04 · FEEDBACK', title: 'End-of-day report', line: 'A specific daily picture, per agent, of what to fix.' },\n      { step: '05 · COACH', title: 'Personalised training', line: \"Built from that agent's real gaps, assigned and tracked.\" },\n      { step: '06 · PROVE', title: 'Before / after', line: 'Re-tested. If it stalls, a human trainer steps in.' }\n    ];\n\n    const controls = [\n      { h: 'Data residency in India', rest: 'Hosted and processed in-country, end to end.' },\n      { h: 'Aligned to RBI, IRDAI, DPDP & TRAI', rest: 'Consent, disclosures and DND handled in-flow.' },\n      { h: 'Grounded answers', rest: 'No model-invented figures — facts come from approved engines.' },\n      { h: 'Human-in-the-loop', rest: 'Sensitive actions need approval before commit.' },\n      { h: 'Full audit trail', rest: 'Every interaction logged, replayable, with role-based PII masking.' },\n      { h: 'Approved content only', rest: 'Scripts and disclosures reviewed and locked before go-live.' }\n    ];\n\n    const stats = [\n      { v: '100%', l: 'of calls transcribed, scored & auditable', s: 'Evitar operating standard' },\n      {
