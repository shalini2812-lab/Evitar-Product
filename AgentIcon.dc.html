<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;">
  <sc-if value="{{ isVoice }}" hint-placeholder-val="{{ false }}">
    <svg viewBox="0 0 24 24" fill="none" stroke="#6FF0B4" stroke-width="1.7" stroke-linecap="round" style="width: 60%; height: 60%;"><line x1="6" y1="10" x2="6" y2="14"></line><line x1="10" y1="7" x2="10" y2="17"></line><line x1="14" y1="4.5" x2="14" y2="19.5"></line><line x1="18" y1="9" x2="18" y2="15"></line></svg>
  </sc-if>
  <sc-if value="{{ isWhatsapp }}" hint-placeholder-val="{{ false }}">
    <svg viewBox="0 0 24 24" fill="none" stroke="#6FF0B4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width: 62%; height: 62%;"><path d="M5 16.5 L5 8 A3 3 0 0 1 8 5 L16 5 A3 3 0 0 1 19 8 L19 13 A3 3 0 0 1 16 16 L9.5 16 L6 19 Z"></path><line x1="9" y1="10.5" x2="15" y2="10.5"></line></svg>
  </sc-if>
  <sc-if value="{{ isChat }}" hint-placeholder-val="{{ false }}">
    <svg viewBox="0 0 24 24" fill="none" stroke="#6FF0B4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width: 62%; height: 62%;"><rect x="3.5" y="4.5" width="17" height="12" rx="2.5"></rect><line x1="3.5" y1="8.5" x2="20.5" y2="8.5"></line><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="16.5" x2="12" y2="20"></line></svg>
  </sc-if>
  <sc-if value="{{ isForm }}" hint-placeholder-val="{{ false }}">
    <svg viewBox="0 0 24 24" fill="none" stroke="#6FF0B4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width: 60%; height: 60%;"><rect x="5" y="3" width="14" height="18" rx="2.5"></rect><line x1="8.5" y1="8" x2="15.5" y2="8"></line><line x1="8.5" y1="12" x2="15.5" y2="12"></line><polyline points="8.5,16 10,17.3 12.5,15"></polyline></svg>
  </sc-if>
  <sc-if value="{{ isField }}" hint-placeholder-val="{{ false }}">
    <svg viewBox="0 0 24 24" fill="none" stroke="#6FF0B4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width: 60%; height: 60%;"><circle cx="12" cy="10" r="5.5"></circle><circle cx="12" cy="10" r="1.6" fill="#6FF0B4" stroke="none"></circle><line x1="12" y1="15.5" x2="12" y2="21"></line></svg>
  </sc-if>
  <sc-if value="{{ isQuality }}" hint-placeholder-val="{{ false }}">
    <svg viewBox="0 0 24 24" fill="none" stroke="#6FF0B4" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width: 62%; height: 62%;"><circle cx="12" cy="12" r="8"></circle><polyline points="8.5,12 11,14.4 15.5,9.6"></polyline></svg>
  </sc-if>
  <sc-if value="{{ isCommand }}" hint-placeholder-val="{{ false }}">
    <svg viewBox="0 0 24 24" fill="none" stroke="#6FF0B4" stroke-width="1.7" stroke-linejoin="round" style="width: 58%; height: 58%;"><rect x="4" y="4" width="7" height="7" rx="1.5"></rect><rect x="13" y="4" width="7" height="7" rx="1.5"></rect><rect x="4" y="13" width="7" height="7" rx="1.5"></rect><rect x="13" y="13" width="7" height="7" rx="1.5"></rect></svg>
  </sc-if>
  <sc-if value="{{ isCopilot }}" hint-placeholder-val="{{ false }}">
    <svg viewBox="0 0 24 24" fill="#6FF0B4" stroke="none" style="width: 60%; height: 60%;"><path d="M12 3 L13.6 10.4 L21 12 L13.6 13.6 L12 21 L10.4 13.6 L3 12 L10.4 10.4 Z"></path></svg>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:48,&quot;height&quot;:48},&quot;glyph&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;voice&quot;,&quot;whatsapp&quot;,&quot;chat&quot;,&quot;form&quot;,&quot;field&quot;,&quot;quality&quot;,&quot;command&quot;,&quot;copilot&quot;],&quot;default&quot;:&quot;voice&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const g = this.props.glyph;
    return {
      isVoice: g === 'voice', isWhatsapp: g === 'whatsapp', isChat: g === 'chat',
      isForm: g === 'form', isField: g === 'field', isQuality: g === 'quality',
      isCommand: g === 'command', isCopilot: g === 'copilot'
    };
  }
}
</script>
</body>
</html>
